services:
  mcp-k8s:
    build: .
    image: mcp-k8s
    container_name: mcp-k8s
    restart: unless-stopped
    volumes:
      - /home/dev/projects/persona/k8/kubeconfig-internal.yaml:/root/.kube/config:ro
      - /usr/local/bin/kubectl:/usr/local/bin/kubectl:ro
    environment:
      - KUBECONFIG=/root/.kube/config
      # Optional: operator mutation denylist. Comma-separated kinds (PascalCase).
      # When set, REPLACES the default denylist (Secret,ClusterRole,ClusterRoleBinding,ServiceAccount).
      # Example: MCP_K8S_DENYLIST=Secret,Pod,ClusterRoleBinding
      - MCP_K8S_DENYLIST
    networks:
      - traefik-proxy
    # MCP over stdio doesn't expose HTTP ports by default
    # Uncomment below when you're ready to expose via Traefik
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.mcp-k8s.rule=Host(`mcp-k8s.ali3n.cloud`)"
    #   - "traefik.http.routers.mcp-k8s.entrypoints=websecure"
    #   - "traefik.http.routers.mcp-k8s.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.mcp-k8s.loadbalancer.server.port=8000"

networks:
  traefik-proxy:
    external: true
